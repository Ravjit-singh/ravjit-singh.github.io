<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050505">
    <title>Devstore</title>
    
    <!-- Preload the app font and server connection -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://devstore-ojn0.onrender.com">

    <style>
        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: opacity 0.3s ease-out; /* Smooth fade to black before handoff */
        }
        
        /* Premium Glowing App Icon */
        .app-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #00E5FF 0%, #007BFF 100%);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 229, 255, 0.2), inset 0 2px 0 rgba(255,255,255,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 24px;
            animation: pulse-icon 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .app-icon::after {
            content: '';
            width: 24px;
            height: 24px;
            background-color: #050505;
            border-radius: 6px;
            transform: rotate(45deg);
        }

        @keyframes pulse-icon {
            0%, 100% { transform: scale(1); box-shadow: 0 10px 30px rgba(0, 229, 255, 0.2); }
            50% { transform: scale(0.95); box-shadow: 0 5px 15px rgba(0, 229, 255, 0.4); }
        }

        /* Typography */
        h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin: 0 0 4px 0;
            text-transform: uppercase;
        }

        p {
            font-size: 13px;
            font-weight: 600;
            color: #777777;
            margin: 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Subtle Loader at the bottom */
        .loader-track {
            position: absolute;
            bottom: 40px;
            width: 120px;
            height: 3px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .loader-fill {
            height: 100%;
            width: 0%;
            background-color: #00E5FF;
            border-radius: 2px;
            animation: load-bar 1.2s ease-in-out forwards;
        }

        @keyframes load-bar {
            0% { width: 0%; transform: translateX(0); }
            100% { width: 100%; transform: translateX(0); }
        }
    </style>

    <!-- PWA Injected by PWA Forge -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <meta name="theme-color" content="#000000">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./service-worker.js');
        });
      }
    </script>
</head>
<body>

    <div class="app-icon"></div>
    <h1>Ravjit</h1>
    <p>DevStore OS</p>

    <div class="loader-track">
        <div class="loader-fill"></div>
    </div>

    <script>
        const targetUrl = "https://devstore-ojn0.onrender.com";
        
        // Wait 1.2 seconds for the progress bar to fill
        setTimeout(() => {
            // Fade the screen out for a smooth transition
            document.body.style.opacity = '0';
            
            // Execute the handoff 300ms later (Total time = 1.5s)
            setTimeout(() => {
                window.location.replace(targetUrl);
            }, 300);
        }, 1200);
    </script>

</body>
</html>
